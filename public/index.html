<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify Proxy Service</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: rgba(255, 253, 248, 0.92);
        --ink: #1e1a16;
        --muted: #5f5347;
        --accent: #c84d1b;
        --border: #e7d7c5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(200, 77, 27, 0.12), transparent 30%),
          linear-gradient(180deg, #fbf7f0 0%, #f4efe6 100%);
      }

      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(41, 27, 15, 0.08);
        backdrop-filter: blur(8px);
      }

      .pill {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(200, 77, 27, 0.08);
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p,
      li {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      code,
      pre {
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      pre {
        overflow: auto;
        background: #251c15;
        color: #f8efe3;
        border-radius: 18px;
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="pill">Standalone Project</div>
        <h1>Proxy Service</h1>
        <p>这个站点只提供代理转发接口，不依赖原来的 NestJS 项目。</p>
        <p>可用入口：<code>GET/POST /proxy/request</code></p>
        <pre>{
  "url": "https://httpbin.org/anything",
  "method": "POST",
  "headers": "{\"Authorization\":\"Bearer token\"}",
  "body": "{\"hello\":\"world\"}"
}</pre>
      </section>
    </main>
  </body>
  </html>
